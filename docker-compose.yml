version: "3.9"

services:

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DYNAMODB_ENDPOINT=
    networks:
      - urban-net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - urban-net

networks:
  urban-net:
    driver: bridge