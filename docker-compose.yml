services:

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      - DYNAMODB_ENDPOINT=
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    networks:
      - urban-net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - urban-net

networks:
  urban-net:
    driver: bridge