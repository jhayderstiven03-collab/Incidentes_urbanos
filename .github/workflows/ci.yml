name: CI - Urban Incidents

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: 🧹 Lint Backend (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar Ruff
        run: pip install ruff
      - name: Correr Ruff
        working-directory: ./backend
        run: ruff check .

  security-scan:
    name: 🛡️ Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar Bandit
        run: pip install bandit
      - name: Correr Bandit
        working-directory: ./backend
        run: bandit -r . -ll

  test-backend:
    name: 🧪 Tests Backend (Python)
    runs-on: ubuntu-latest
    needs: [lint-backend, security-scan]
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Correr pruebas con pytest
        working-directory: ./backend
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  test-frontend:
    name: 💅 Lint & Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Instalar dependencias
        working-directory: ./frontend
        run: npm ci
      - name: Correr Lint
        working-directory: ./frontend
        run: npm run lint
      - name: Correr Build
        working-directory: ./frontend
        run: npm run build

  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t urban-incidents-backend ./backend

      - name: Build frontend image
        run: docker build -t urban-incidents-frontend ./frontend

  integration-test:
    name: 🔗 Test Integración con Cloud DB
    runs-on: ubuntu-latest
    needs: build-docker
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      PORT: 8080
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar Secretos de AWS
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ ERROR: AWS_ACCESS_KEY_ID no está configurado en los Secretos de GitHub."
            exit 1
          fi

      - name: Levantar servicios con docker-compose
        run: docker compose up -d

      - name: Esperar que backend esté listo (Healthcheck mejorado)
        run: |
          echo "Esperando backend..."
          curl --retry 10 --retry-connrefused --retry-delay 5 -sf http://localhost:8080/ || exit 1

      - name: Verificar endpoint raíz
        run: curl -sf http://localhost:8080/ | grep "ok"

      - name: Verificar endpoint incidentes
        run: curl -sf http://localhost:8080/incidents/

      - name: Apagar servicios
        run: docker compose down

      - name: Mostrar logs de backend si falló
        if: failure()
        run: docker logs backend

  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Deploy Backend
        run: curl -f "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
      - name: Deploy Frontend
        run: curl -f "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"